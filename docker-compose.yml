services:
  web:
    build: .
    container_name: newshub-web
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_NAME: newshub
      DB_USER: webuser
      DB_PASS: webpass123
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:10.11
    container_name: newshub-db
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MARIADB_ROOT_PASSWORD: rootpass123
      MARIADB_DATABASE: newshub
      MARIADB_USER: webuser
      MARIADB_PASSWORD: webpass123
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -uroot -p$${MARIADB_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  db_data:
